<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - VISTA 2027 | Bharti Vidyapeeth College of Engineering Pune</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-header">
            <img src="../img/clg logo.png" alt="Bharti Vidyapeeth Logo" class="login-logo">
            <h1>VISTA 2027</h1>
            <p>Admin Console Login</p>
        </div>

        <!-- Error Notification Section -->
        <div id="errorBox" class="error-message">
            <i class="fas fa-circle-exclamation" style="margin-top: 3px;"></i>
            <span id="errorText">Invalid credentials. Please try again.</span>
        </div>

        <form id="loginForm">
            <!-- Email Field -->
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" class="form-input" placeholder="admin@bvvistacon.in" required autocomplete="email">
                </div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" id="togglePassword" class="password-toggle" aria-label="Toggle password visibility">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Options (Remember me UI) -->
            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox" id="rememberMe" class="checkbox-input">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password" onclick="alert('Please contact the system administrator to reset your password.')">Forgot Password?</a>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="loginBtn" class="btn-login">
                <span class="spinner"></span>
                <span class="btn-text">Log In Securely</span>
                <i class="fas fa-right-to-bracket"></i>
            </button>
        </form>
    </div>

    <!-- Toast Container for Toast Messages -->
    <div id="toastContainer" class="toast-container"></div>

    <script type="module" src="admin.js"></script>
</body>
</html>
